<svg width="100%" viewBox="0 0 720 980" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Kigali Smart Parking Management System — Layered Architecture Diagram</title>
  <desc>Architecture of the in-memory C++ Smart Parking system: console UI, ParkingSystem facade with four managers, domain models, six DSA structures, and OOP hierarchies for Vehicle and Report.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
    <style>
      .layer-box { rx: 8; stroke-width: 0.5; }
      .diagram-title { font: 700 18px sans-serif; text-anchor: middle; }
      .diagram-subtitle { font: 400 13px sans-serif; text-anchor: middle; }
      .title { font: 500 14px sans-serif; text-anchor: middle; }
      .subtitle { font: 400 11px sans-serif; text-anchor: middle; }
      .ds-title { font: 500 12px sans-serif; text-anchor: middle; }
      .ds-sub { font: 400 10px sans-serif; text-anchor: middle; }
      .arrow { fill: none; stroke: #9c9a92; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
</defs>

  <!-- Main diagram title -->
  <rect x="20" y="12" width="680" height="58" rx="10" fill="#2a2a28" stroke="#d3d1c7"/>
  <text class="diagram-title" x="360" y="36" fill="#ffffff">Kigali Smart Parking Management System</text>
  <text class="diagram-subtitle" x="360" y="56" fill="#b4b2a9">In-memory layered architecture — real-time slot allocation, billing, and reporting (C++ / DSA)</text>

  <!-- Presentation layer -->
  <rect class="layer-box" x="40" y="88" width="640" height="64" fill="#444441" stroke="#b4b2a9"/>
  <text class="title" x="360" y="114" fill="#d3d1c7">Presentation layer</text>
  <text class="subtitle" x="360" y="134" fill="#b4b2a9">main.cpp — validated menu, test/demo modes, payment capture</text>

  <line class="arrow" x1="360" y1="152" x2="360" y2="172"/>

  <!-- Facade -->
  <rect class="layer-box" x="40" y="174" width="640" height="40" fill="#3c3489" stroke="#afa9ec"/>
  <text class="title" x="360" y="200" fill="#cecbf6">ParkingSystem façade — coordinates all managers</text>

  <line class="arrow" x1="360" y1="214" x2="360" y2="232"/>

  <!-- Four managers -->
  <rect class="layer-box" x="40" y="234" width="150" height="72" fill="#3c3489" stroke="#afa9ec"/>
  <text class="title" x="115" y="258" fill="#cecbf6">SlotManager</text>
  <text class="subtitle" x="115" y="276" fill="#afa9ec">CRUD · zone search</text>
  <text class="subtitle" x="115" y="292" fill="#afa9ec">O(log n) allocate</text>

  <rect class="layer-box" x="204" y="234" width="150" height="72" fill="#3c3489" stroke="#afa9ec"/>
  <text class="title" x="279" y="258" fill="#cecbf6">VehicleManager</text>
  <text class="subtitle" x="279" y="276" fill="#afa9ec">entry / exit</text>
  <text class="subtitle" x="279" y="292" fill="#afa9ec">Vehicle* sessions</text>

  <rect class="layer-box" x="368" y="234" width="150" height="72" fill="#3c3489" stroke="#afa9ec"/>
  <text class="title" x="443" y="258" fill="#cecbf6">BillingManager</text>
  <text class="subtitle" x="443" y="276" fill="#afa9ec">fees · tariffs</text>
  <text class="subtitle" x="443" y="292" fill="#afa9ec">payment records</text>

  <rect class="layer-box" x="532" y="234" width="148" height="72" fill="#3c3489" stroke="#afa9ec"/>
  <text class="title" x="606" y="258" fill="#cecbf6">ReportManager</text>
  <text class="subtitle" x="606" y="276" fill="#afa9ec">polymorphic</text>
  <text class="subtitle" x="606" y="292" fill="#afa9ec">reports</text>

  <!-- Domain models -->
  <rect class="layer-box" x="40" y="326" width="640" height="54" fill="#085041" stroke="#5dcaa5"/>
  <text class="title" x="360" y="350" fill="#9fe1cb">Domain models</text>
  <text class="subtitle" x="360" y="368" fill="#5dcaa5">ParkingSlot · Vehicle hierarchy · ParkingTransaction · TariffManager · Report</text>

  <line class="arrow" x1="360" y1="380" x2="360" y2="400"/>

  <!-- Data layer -->
  <rect class="layer-box" x="40" y="402" width="640" height="36" fill="#085041" stroke="#5dcaa5"/>
  <text class="title" x="360" y="426" fill="#9fe1cb">Data layer — six in-memory DSA structures</text>

  <!-- Row 1 DS -->
  <rect class="layer-box" x="40" y="454" width="200" height="72" fill="#085041" stroke="#5dcaa5"/>
  <text class="ds-title" x="140" y="478" fill="#9fe1cb">unordered_map</text>
  <text class="ds-sub" x="140" y="494" fill="#5dcaa5">&lt;slotId, ParkingSlot&gt;</text>
  <text class="ds-sub" x="140" y="510" fill="#5dcaa5">SlotManager::slots</text>

  <rect class="layer-box" x="260" y="454" width="200" height="72" fill="#085041" stroke="#5dcaa5"/>
  <text class="ds-title" x="360" y="478" fill="#9fe1cb">map + set</text>
  <text class="ds-sub" x="360" y="494" fill="#5dcaa5">availableByType</text>
  <text class="ds-sub" x="360" y="510" fill="#5dcaa5">O(log n) slot pick</text>

  <rect class="layer-box" x="480" y="454" width="200" height="72" fill="#085041" stroke="#5dcaa5"/>
  <text class="ds-title" x="580" y="478" fill="#9fe1cb">unordered_map</text>
  <text class="ds-sub" x="580" y="494" fill="#5dcaa5">&lt;zone, slotIds&gt;</text>
  <text class="ds-sub" x="580" y="510" fill="#5dcaa5">zone search index</text>

  <!-- Row 2 DS -->
  <rect class="layer-box" x="40" y="542" width="200" height="72" fill="#085041" stroke="#5dcaa5"/>
  <text class="ds-title" x="140" y="566" fill="#9fe1cb">unordered_map</text>
  <text class="ds-sub" x="140" y="582" fill="#5dcaa5">&lt;plate, Vehicle*&gt;</text>
  <text class="ds-sub" x="140" y="598" fill="#5dcaa5">active sessions</text>

  <rect class="layer-box" x="260" y="542" width="200" height="72" fill="#085041" stroke="#5dcaa5"/>
  <text class="ds-title" x="360" y="566" fill="#9fe1cb">vector + index</text>
  <text class="ds-sub" x="360" y="582" fill="#5dcaa5">ParkingTransaction[]</text>
  <text class="ds-sub" x="360" y="598" fill="#5dcaa5">plateHistoryIndex</text>

  <rect class="layer-box" x="480" y="542" width="200" height="72" fill="#085041" stroke="#5dcaa5"/>
  <text class="ds-title" x="580" y="566" fill="#9fe1cb">map + hash map</text>
  <text class="ds-sub" x="580" y="582" fill="#5dcaa5">dailyRevenueIndex</text>
  <text class="ds-sub" x="580" y="598" fill="#5dcaa5">VehicleType → rate</text>

  <!-- OOP Vehicle hierarchy -->
  <rect class="layer-box" x="40" y="640" width="310" height="118" fill="#712b13" stroke="#f0997b"/>
  <text class="title" x="195" y="666" fill="#f5c4b3">OOP — Vehicle inheritance</text>
  <text class="subtitle" x="195" y="688" fill="#f0997b">Vehicle (abstract)</text>
  <text class="subtitle" x="195" y="706" fill="#f0997b">├── MotorcycleVehicle</text>
  <text class="subtitle" x="195" y="724" fill="#f0997b">├── CarVehicle</text>
  <text class="subtitle" x="195" y="742" fill="#f0997b">└── TruckVehicle → calculateFee()</text>

  <!-- OOP Report hierarchy -->
  <rect class="layer-box" x="370" y="640" width="310" height="118" fill="#712b13" stroke="#f0997b"/>
  <text class="title" x="525" y="666" fill="#f5c4b3">OOP — Report polymorphism</text>
  <text class="subtitle" x="525" y="688" fill="#f0997b">Report (abstract)</text>
  <text class="subtitle" x="525" y="706" fill="#f0997b">├── SlotsReport</text>
  <text class="subtitle" x="525" y="724" fill="#f0997b">├── ParkedVehiclesReport</text>
  <text class="subtitle" x="525" y="742" fill="#f0997b">└── DailyRevenueReport</text>

  <!-- Algorithms -->
  <rect class="layer-box" x="40" y="778" width="640" height="72" fill="#444441" stroke="#b4b2a9"/>
  <text class="title" x="360" y="804" fill="#d3d1c7">Key algorithms</text>
  <text class="subtitle" x="360" y="824" fill="#b4b2a9">Slot allocation: set::begin() O(log n) · Billing: (minutes+59)/60 ceiling</text>
  <text class="subtitle" x="360" y="842" fill="#b4b2a9">Duplicate check O(1) · Plate history O(1) lookup · Daily revenue O(1) via date map</text>

  <!-- Data flow note -->
  <rect class="layer-box" x="40" y="866" width="640" height="48" fill="#2a2a28" stroke="#b4b2a9"/>
  <text class="subtitle" x="360" y="896" fill="#d3d1c7">Flow: Menu → ParkingSystem → Managers → DSA structures → polymorphic reports / console output</text>

</svg>
